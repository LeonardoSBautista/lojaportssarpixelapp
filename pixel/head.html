<!-- pixel/body.html -->

<script>
(function () {
var PIX_DISCOUNT = 0.07;
var POLL_INTERVAL = 500;
var MAX_ATTEMPTS = 60;

function parseVtexPrice(container) {
if (!container) return null;
var integerNodes = container.querySelectorAll('.vtex-product-price-1-x-currencyInteger');
var fractionNode = container.querySelector('.vtex-product-price-1-x-currencyFraction');
if (!integerNodes || !integerNodes.length) return null;
var intStr = Array.from(integerNodes).map(function (n) { return (n.textContent||'').replace(/\D/g,''); }).join('');
var fracStr = fractionNode ? (fractionNode.textContent||'').replace(/\D/g,'') : '00';
if (!intStr) return null;
var price = parseFloat(intStr + '.' + (fracStr || '00'));
return isNaN(price) ? null : price;
}

function formatBRL(value) {
return value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function createPixElement(price, className) {
var el = document.createElement('span');
el.className = className;
el.style.cssText = 'font-size:0.875rem;color:#333;font-weight:500;display:block;';
el.innerHTML = 'ou por <strong style="color:#C0130F;">R$&nbsp;' + formatBRL(price) + '</strong> à vista no <strong style="color:#C0130F;">Boleto ou PIX</strong>';
return el;
}

function getPriceContainer(card) {
if (!card) return null;
return card.querySelector('.vtex-product-price-1-x-spotPriceValue .vtex-product-price-1-x-currencyContainer') ||
card.querySelector('.vtex-product-price-1-x-sellingPriceValue .vtex-product-price-1-x-currencyContainer') ||
card.querySelector('.vtex-product-price-1-x-currencyContainer');
}

function getPixRow(card) {
if (!card) return null;
return card.querySelector('.vtex-flex-layout-0-x-flexRowContent--pix-price') ||
card.querySelector('.vtex-flex-layout-0-x-flexRowContent--pix-price-pdp') ||
card.querySelector('.vtex-flex-layout-0-x-flexRowContent--pixPrice') ||
card.querySelector('.vtex-flex-layout-0-x-flexRowContent--hasntBestPrice'); // fallback prudente
}

function alreadyHasPix(pixRow) {
if (!pixRow) return false;
return pixRow.querySelector('.custom-pix-price, .custom-pix-price-pdp') !== null;
}

function injectPixToCard(card, isPDP) {
if (!card) return;
var pixRow = getPixRow(card);
if (!pixRow) return;
if (alreadyHasPix(pixRow)) return; // evita duplicação

var priceContainer = getPriceContainer(card);
if (!priceContainer) return;
var basePrice = parseVtexPrice(priceContainer);
if (!basePrice) return;
var pixPrice = basePrice * (1 - PIX_DISCOUNT);

var className = isPDP ? 'custom-pix-price-pdp' : 'custom-pix-price';
var el = createPixElement(pixPrice, className);
pixRow.appendChild(el);
}

function processShelf() {
var cards = document.querySelectorAll('.vtex-product-summary-2-x-container');
cards.forEach(function (card) {
injectPixToCard(card, false);
});
}

function processPDP() {
// PDP pode não ter .vtex-product-summary-2-x-container; procuramos o pixRow global da PDP
var pixRow = document.querySelector('.vtex-flex-layout-0-x-flexRowContent--pix-price-pdp') || document.querySelector('.vtex-flex-layout-0-x-flexRowContent--pix-price');
if (!pixRow) return;
if (alreadyHasPix(pixRow)) return;

// procurar o price container mais próximo (PDP normalmente está fora do card)
var priceContainer = document.querySelector('.vtex-product-price-1-x-sellingPriceValue .vtex-product-price-1-x-currencyContainer') ||
document.querySelector('.vtex-product-price-1-x-spotPriceValue .vtex-product-price-1-x-currencyContainer') ||
document.querySelector('.vtex-product-price-1-x-currencyContainer');
if (!priceContainer) return;
var basePrice = parseVtexPrice(priceContainer);
if (!basePrice) return;
var pixPrice = basePrice * (1 - PIX_DISCOUNT);

var el = createPixElement(pixPrice, 'custom-pix-price-pdp');
pixRow.appendChild(el);
}

function processAll() {
processShelf();
processPDP();
}

function startPolling() {
var attempts = 0;
var interval = setInterval(function () {
attempts++;
processAll();
if (attempts >= MAX_ATTEMPTS) clearInterval(interval);
}, POLL_INTERVAL);
}

function startObserver() {
if (!document.body) return;
var timeoutId = null;
var observer = new MutationObserver(function () {
if (timeoutId) clearTimeout(timeoutId);
timeoutId = setTimeout(function () { processAll(); timeoutId = null; }, 120); // debounce leve
});
observer.observe(document.body, { childList: true, subtree: true });
}

function init() {
processAll();
startPolling();
startObserver();
}

if (document.readyState === 'loading') {
document.addEventListener('DOMContentLoaded', init);
} else {
init();
} })();
</script>
